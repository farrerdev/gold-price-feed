name: Update gold prices

on:
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python scripts/fetch_gold_prices.py
      - run: |
          git config user.name "gold-price-bot"
          git config user.email "gold-price-bot@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Update gold prices"
          git push
